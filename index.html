<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizza World - You'll Love It</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<nav>
<div class="logo">🍕 Pizza World</div>

<ul class="nav-menu">
<li><a onclick="scrollToSection('menu')">Menu</a></li>
<li><a onclick="scrollToSection('contact')">Contact</a></li>

<li class="cart-icon" onclick="openCart()">
🛒 <span id="cartCount">0</span>
</li>
</ul>

</nav>
</header>

<section class="hero">
<h1>Welcome to Pizza World</h1>
<p>Delicious, Fresh & Made with Love</p>

<button class="cta-button" onclick="scrollToSection('menu')">
Order Now
</button>
</section>

<section class="menu-section" id="menu">
<h2>Our Menu</h2>

<div class="menu-grid" id="menuGrid"></div>
</section>

<section class="contact-section" id="contact">
<h2>Contact Us</h2>

<div class="contact-item">
📍 Pizza World<br> Bouddha Kathmandu, Nepal
</div>

<div class="contact-item">
📞 014991933
</div>

<div class="contact-item">
✉ info@pizzaworld.com.np
</div>

</section>

<!-- CART -->
<div id="cartModal" class="modal">
<div class="modal-content">

<span class="close-btn" onclick="closeCart()">&times;</span>

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3>Total: $<span id="cartTotal">0</span></h3>

<button onclick="checkout()">Checkout</button>

</div>
</div>

<footer>
<p>© 2026 Pizza World</p>
</footer>

<script src="script.js"></script>

</body>
</html>
